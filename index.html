      // Framer Motion Safe wrapper (robust fallback for CDN issues)

      const MotionSafe = (() => {
        let motionLib = null;
        let presenceLib = null;
        try {
          if (typeof window !== 'undefined') {
            if (window.FramerMotion) motionLib = window.FramerMotion;
            else if (window['framer-motion']) motionLib = window['framer-motion'];
            else if (window.motion) motionLib = window;
          }
          if (motionLib && motionLib.motion) {
            return { motion: motionLib.motion, AnimatePresence: motionLib.AnimatePresence || (() => null) };
          }
        } catch(e) { console.warn(e); }
        // Fallback: create dummy motion components that render regular elements
        const createFallbackMotion = (Component) => {
          return (props) => {
            const { children, whileInView, initial, animate, transition, viewport, whileHover, ...rest } = props;
            return React.createElement(Component || 'div', rest, children);
          };
        };
        const dummyMotion = {
          div: createFallbackMotion('div'),
          nav: createFallbackMotion('nav'),
          section: createFallbackMotion('section'),
          form: createFallbackMotion('form'),
          button: createFallbackMotion('button')
        };
        return { motion: dummyMotion, AnimatePresence: () => null };
      })();

      // Resume section with proper download (text + JSON resume styling)
      const ResumeSection = () => {
        const [copied, setCopied] = React.useState(false);
        const resumeText = `Dileep Kumar - BCA Cloud Technology Portfolio\n===========================================\nEducation: BCA (Cloud Technology) | Nitte Institute of Professional Education\nSkills: Python, Java, JavaScript, React, Tailwind CSS, Microsoft Azure, HTML5/CSS3, Flask.\nExperience:\n- Full Stack Intern @ Zephyr Technologies: Develop full-stack features, collaborate in agile sprints, implement responsive UI.\n- Python Intern @ System Tron: Scripting, debugging, problem-solving modules.\n- Cloud Technology Intern @ Intellipaat: Azure services, virtual machines, static web apps.\n- Front-End Intern: HTML/CSS modern layouts & accessibility.\nCertifications: Python, Azure Cloud, Front-End Dev, Design Thinking, Employability Skills.\nProjects: Cloud Task Manager, Portfolio 3.0, E-commerce Dashboard, WeatherWise App.\nContact: dileep.kumar@example.com | LinkedIn: linkedin.com/in/dileep-kumar\n-------------------------------------------\nThis resume was generated from Dileep's official portfolio.`;
        const handleDownload = () => {
          const blob = new Blob([resumeText], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = 'Dileep_Kumar_Resume.txt';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
        };
        const handleCopy = async () => {
          try {
            await navigator.clipboard.writeText(resumeText);
            setCopied(true);
            setTimeout(() => setCopied(false), 2200);
          } catch (err) {
            window.prompt('Copy the resume text manually:', resumeText);
          }
        };
        return (
          <section id="resume" className="py-20 bg-gradient-to-r from-[#F8FAFC] to-[#EEF2FF] scroll-mt-16">
            <div className="max-w-4xl mx-auto px-6 text-center">
              <motion.div whileInView={{ opacity: 1, y: 0 }} initial={{ opacity: 0, y: 20 }} viewport={{ once: true }}>
                <div className="bg-white w-20 h-20 rounded-full flex items-center justify-center mx-auto shadow-md"><i className="fas fa-file-alt text-4xl text-[#2563EB]"></i></div>
                <h2 className="text-3xl font-bold text-[#0F172A] mt-4">My Resume</h2>
                <p className="text-[#1E293B]/70 mt-2 mb-6 max-w-md mx-auto">Download my resume or copy the summary to your clipboard instantly.</p>
                <div className="grid gap-4 sm:grid-cols-2 mt-6">
                  <button onClick={handleDownload} className="inline-flex items-center gap-3 justify-center bg-[#2563EB] hover:bg-[#1e4bc2] text-white px-6 py-4 rounded-xl font-bold text-lg shadow-lg transition-all hover:scale-105"><i className="fas fa-download"></i> Download Resume</button>
                  <button onClick={handleCopy} className="inline-flex items-center gap-3 justify-center border border-[#2563EB] text-[#2563EB] px-6 py-4 rounded-xl font-bold text-lg hover:bg-[#2563EB]/10 transition-all hover:scale-105"><i className="fas fa-copy"></i> Copy Resume Summary</button>
                </div>
                {copied && <div className="mt-4 inline-block bg-green-100 text-green-700 px-4 py-3 rounded-xl font-semibold">Copied to clipboard!</div>}
              </motion.div>
            </div>
          </section>
        );
      };

      const Contact = () => {
        const [formData, setFormData] = React.useState({ name: '', email: '', message: '' });
        const [submitted, setSubmitted] = React.useState(false);
        const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
        const handleSubmit = (e) => {
          e.preventDefault();
          console.log('Contact form submitted:', formData);
          setSubmitted(true);
          setTimeout(() => setSubmitted(false), 3500);
          setFormData({ name: '', email: '', message: '' });
        };
        return (
          <section id="contact" className="py-20 bg-white scroll-mt-16">
            <div className="max-w-5xl mx-auto px-6 md:px-10">
              <motion.div whileInView={{ opacity: 1 }} initial={{ opacity: 0 }} viewport={{ once: true }} className="text-center"><h2 className="text-3xl font-bold text-[#0F172A] border-b-4 border-[#2563EB] pb-2 inline-block">Get In Touch</h2></motion.div>
              <div className="grid md:grid-cols-2 gap-12 mt-12">
                <motion.div initial={{ x: -20, opacity: 0 }} whileInView={{ x: 0, opacity: 1 }} viewport={{ once: true }}>
                  <p className="text-[#1E293B] leading-relaxed">I’m actively looking for new projects and exciting collaborations. Let's create something meaningful together — reach out by email or through LinkedIn.</p>
                  <div className="mt-8 space-y-5">
                    <div className="flex items-center gap-4"><i className="fas fa-envelope w-6 text-[#2563EB] text-xl"></i><span className="break-all">dk8404714@gmail.com</span></div>
                    <div className="flex items-center gap-4"><i className="fab fa-linkedin w-6 text-[#2563EB] text-xl"></i><a href="https://www.linkedin.com/in/dileep-kumar-ha/" target="_blank" rel="noopener noreferrer" className="hover:underline text-[#2563EB]">linkedin.com/in/dileep-kumar-ha</a></div>
                    <div className="flex items-center gap-4"><i className="fab fa-github w-6 text-[#2563EB] text-xl"></i><a href="#" className="hover:underline">github.com/dileepkumar</a></div>
                  </div>
                </motion.div>
                <motion.form onSubmit={handleSubmit} initial={{ x: 20, opacity: 0 }} whileInView={{ x: 0, opacity: 1 }} viewport={{ once: true }} className="bg-[#F8FAFC] p-6 rounded-2xl shadow-md">
                  {submitted && <div className="mb-4 bg-green-100 text-green-700 p-3 rounded-xl text-center font-medium">✓ Message sent! I'll reply soon.</div>}
                  <div className="mb-4"><input type="text" name="name" value={formData.name} onChange={handleChange} placeholder="Full Name" required className="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#2563EB]" /></div>
                  <div className="mb-4"><input type="email" name="email" value={formData.email} onChange={handleChange} placeholder="Email Address" required className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#2563EB]" /></div>
                  <div className="mb-5"><textarea name="message" rows="4" value={formData.message} onChange={handleChange} placeholder="Your message..." required className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#2563EB]"></textarea></div>
                  <button type="submit" className="w-full bg-[#2563EB] hover:bg-[#1e4bc2] text-white font-semibold py-3 rounded-xl transition flex gap-2 justify-center items-center"><i className="fas fa-paper-plane"></i> Send Message</button>
                </motion.form>
              </div>
            </div>
          </section>
        );
      };

      const Footer = () => (
        <footer className="bg-[#0F172A] text-white py-8 text-center">
          <p>© Dileep Kumar — Cloud & Full Stack Portfolio. All rights reserved.</p>
          <div className="flex justify-center gap-6 mt-3">
            <a href="#" className="hover:text-[#38BDF8] transition"><i className="fab fa-linkedin text-xl"></i></a>
            <a href="#" className="hover:text-[#38BDF8] transition"><i className="fab fa-github text-xl"></i></a>
          </div>
        </footer>
      );

      // Main App Component
      const App = () => {
        const [funFactText, setFunFactText] = React.useState('Click a button to discover something cool.');
        const [selectedProjectIndex, setSelectedProjectIndex] = React.useState(null);
        const [isDarkMode, setIsDarkMode] = React.useState(false);
        const [isProfileVisible, setIsProfileVisible] = React.useState(false);

        React.useEffect(() => {
          const handleAnchorClick = (e) => {
            let target = e.target.closest('a');
            if (target && target.hash && target.hash.startsWith('#') && target.hash !== '#') {
              const id = target.hash.substring(1);
              const element = document.getElementById(id);
              if (element) {
                e.preventDefault();
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }
            }
          };
          document.addEventListener('click', handleAnchorClick);
          return () => document.removeEventListener('click', handleAnchorClick);
        }, []);

        const handleRevealFact = () => {
          const next = funFacts[Math.floor(Math.random() * funFacts.length)];
          setFunFactText(next);
        };

        const handlePickProject = () => {
          const nextIndex = Math.floor(Math.random() * projectsData.length);
          setSelectedProjectIndex(nextIndex);
          setFunFactText(`You selected: ${projectsData[nextIndex].title}`);
          document.getElementById('projects')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        const toggleTheme = () => {
          setIsDarkMode((prev) => !prev);
        };

        const toggleProfileVisibility = () => {
          setIsProfileVisible((prev) => !prev);
        };

        return (
          <div className={`overflow-x-hidden ${isDarkMode ? 'bg-slate-950 text-slate-100' : ''}`}>
            <NavBar isDarkMode={isDarkMode} onToggleTheme={toggleTheme} />
            <Hero
              funFact={funFactText}
              onRevealFact={handleRevealFact}
              onPickProject={handlePickProject}
              isProfileVisible={isProfileVisible}
              onToggleProfile={toggleProfileVisibility}
            />
            <About />
            <SkillsSection />
            <Experience />
            <CertificationsSection />
            <Projects highlightedIndex={selectedProjectIndex} />
            <ResumeSection />
            <Contact />
            <Footer />
          </div>
        );
      };
      
      // Render to DOM
      const rootElement = document.getElementById('root');
      if (ReactDOM.createRoot) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
      } else {
        ReactDOM.render(<App />, rootElement);
      }
    </script>
  </body>
</html>
